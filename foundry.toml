[profile.default]
src = "contracts/src"
out = "out"
libs = ["contracts/lib", "lib"]
test = "contracts/test"
remappings = [
  "@hyper-evm-lib/=contracts/lib/hyper-evm-lib/",
  "@openzeppelin/contracts/=contracts/lib/openzeppelin-contracts/contracts/",
  "openzeppelin-contracts/=contracts/lib/openzeppelin-contracts/",
  "forge-std/=contracts/lib/forge-std/src/",
]
cache_path = "cache"
solc = "0.8.30"
optimizer = true
optimizer_runs = 10
via_ir = true
bytecode_hash = "none"
cbor_metadata = false

# Hyperliquid testnet blocks report gasLimit ≈ 3_000_000; deploy txs must stay under that.
# Lower `optimizer_runs` can shrink initcode slightly (this repo still needs `via_ir` = stack depth).
[profile.hl_testnet]
optimizer_runs = 1

# Exclude certora + mocks that cause missing file issues
# Suppress non-actionable third-party simulator warnings from hyper-evm-lib test helpers.
ignored_error_codes = [5667, 2072]
fs_permissions = [{ access = "read", path = "./" }]

# IMPORTANT: ignore these directories
skip = [
  "contracts/lib/**/certora/**",
  "contracts/lib/**/mocks/**",
  "lib/**/certora/**",
  "lib/**/mocks/**",
]

[lint]
lint_on_build = false